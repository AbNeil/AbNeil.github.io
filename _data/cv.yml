  summary: I am a computer scientist with expertise at the intersection of software systems, data-intensive architectures, and AI-enabled platforms. My research focuses on building robust, scalable, and interpretable computational systems, integrating software engineering principles, distributed systems, and machine learning. I combine formal modelling, system-level design, and empirical evaluation to address reliability, performance, and trustworthiness in complex software-driven environments. I bring a strong record of peer-reviewed research, competitive funding, undergraduate and postgraduate teaching, and interdisciplinary collaboration, with clear potential for leadership in Software & Systems research.

