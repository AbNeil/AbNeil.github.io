    Publications:
      - title: Prediction of machine failure in industry 4.0: a hybrid CNN-LSTM framework"
        authors:
          - 
        publisher: Artificial Intelligence and Optimization in Industry 4.0, MDPI
        releaseDate: 2022-04-22
