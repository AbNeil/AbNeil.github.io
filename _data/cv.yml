        summary: This work proposes a method for multivariate time-series forecasting for predictive maintenance (PdM) based on a combination of convolutional neural networks and long short-term memory with skip connection (CNN-LSTM).
        
      - title: Integrating I4. 0 Knowledge Graphs with Large Language Models Beyond SPARQL Endpoints
        authors:
          
        publisher: ISWC
        releaseDate: 2024-08-03
        url: 10.13140/RG.2.2.11628.78724
        summary: In this work, we present a framework and preliminary results of integrating Industry 4.0 KGs with LLMs to improve the way data is represented, reasoned, and processed in manufacturing contexts, which facilitates user interaction with KGs and contributes to operational efficiency.
  

      - title: TCRSCANet: Harnessing temporal convolutions and recurrent skip component for enhanced RUL estimation in mechanical systems
        authors:
         
        publisher: Human-Centric Intelligent Systems
        releaseDate: 2024-03-03
        url: 10.1007/s44230-023-00060-0
        summary: The goal of this study is to find out how to predict the RUL of mechanical systems using complex sensor data. To do this, we present a data-driven framework called temporal convolution, along with a recurrent skip component and an attention mechanism network called TCRSCANet.

